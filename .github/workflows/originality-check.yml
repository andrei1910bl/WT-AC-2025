name: Duplicate Code Check

on:
  pull_request:
    paths: ['students/**']  # Запускается только при изменении файлов в папке labs

jobs:
  duplicate-code-check:
    name: Check for duplicate code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Detect changed task directory
        id: detect_task
        run: |
          set -euo pipefail

          # Ensure we have enough history (unshallow if necessary)
          git fetch --no-tags --prune --unshallow || true

          # Prefer the GitHub event range when available
          if [ -n "${{ github.event.before }}" ] && [ -n "${{ github.sha }}" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            RANGE="HEAD~1..HEAD"
          else
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" || true
            RANGE="origin/${BASE_REF}..HEAD"
          fi

          # List changed files under students/
          CHANGED_FILES=$(git diff --name-only "$RANGE" -- students/ || true)

          # Collect unique students/<student>/task_XX directories
          mapfile -t DIRS < <(echo "$CHANGED_FILES" | awk -F'/' '/^students\// {print $1"/"$2"/"$3}' | sort -u)

          TASK_DIR=""
          if [ ${#DIRS[@]} -ge 3 ]; then
            THIRD="${DIRS[2]}"
            TASK_DIR=$(basename "$THIRD")
          elif [ ${#DIRS[@]} -ge 1 ]; then
            FIRST="${DIRS[0]}"
            TASK_DIR=$(basename "$FIRST")
          fi

          if [ -z "$TASK_DIR" ]; then
            echo "No task directory found in changes"
            exit 0
          fi

          echo "task_dir=$TASK_DIR" >> $GITHUB_OUTPUT
          echo "Detected task directory: $TASK_DIR"

      - name: Detect changed task directory
        id: detect_task
        run: |
          # Находим измененную task_папку
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- students/)
          TASK_DIR=""
          
          for file in $CHANGED_FILES; do
            if [[ $file =~ students/([^/]+)/(task_[^/]+)/ ]]; then
              TASK_DIR="${BASH_REMATCH[2]}"
              break
            fi
          done
          
          if [ -z "$TASK_DIR" ]; then
            echo "No task directory found in changes"
            exit 0
          fi
          
          echo "task_dir=$TASK_DIR" >> $GITHUB_OUTPUT
          echo "Detected task directory: $TASK_DIR"

      - name: Create comparison directories list
        id: create_dirs
        run: |
          # Создаем список директорий для сравнения, исключая your_id
          COMPARE_DIRS=$(find students -type d -name "${{ steps.detect_task.outputs.task_dir }}" | grep -v "students/your_id" | tr '\n' ' ')
          echo "compare_dirs=$COMPARE_DIRS" >> $GITHUB_OUTPUT
          echo "Directories to compare: $COMPARE_DIRS"

      - name: Run Duplicate Code Detection
        uses: platisd/duplicate-code-detection-tool@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directories: "students"        # Директория для анализа
          ignore_below: 20           # Игнорировать сходство ниже 20%
          fail_above: 70             # Завершить с ошибкой при сходстве выше 70%
          warn_above: 20             # Показать предупреждение при сходстве выше 20%
          file_extensions: "js, html, css"  # Проверять только файлы с этими расширениями
          one_comment: true          # Обновлять один комментарий, а не создавать новые